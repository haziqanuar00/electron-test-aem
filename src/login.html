<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEM Enersol — Sign In</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="signin-wrapper">
  <main class="signin-card">
    <div class="signin-header">
      <h1 class="title">Sign in to your dashboard</h1>
    </div>

    <div class="signin-body">
      <form id="login-form" autocomplete="off" novalidate>
        <div class="form-group">
          <input
            id="username"
            name="username"
            type="email"
            autocomplete="username"
            placeholder="Username"
          />
          <div id="username-error" class="field-error" hidden></div>
        </div>

        <div class="form-group">
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Password"
          />
          <div id="password-error" class="field-error" hidden></div>
        </div>

        <div id="error-message" class="form-error" role="alert" hidden></div>
        <div id="status-note" class="note" hidden></div>

        <button type="submit" id="login-btn" class="btn-submit">SIGN IN</button>
      </form>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
